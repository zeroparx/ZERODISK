<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 28px;
    }

    /* 입력 영역 */
    .input-box {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-row input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]:focus {
      border-color: #4f6ef7;
    }

    .category-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .category-row select {
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-size: 0.9rem;
      background: #fff;
      outline: none;
      cursor: pointer;
      color: #333;
    }

    /* 하위 카테고리 선택 */
    #subcategorySelect {
      display: none;
      padding: 10px 14px;
      border: 1.5px solid #b3c4fc;
      border-radius: 10px;
      font-size: 0.9rem;
      background: #f0f4ff;
      outline: none;
      cursor: pointer;
      color: #3a57e8;
    }

    #subcategorySelect.visible { display: block; }

    .arrow-icon {
      color: #aaa;
      font-size: 0.85rem;
      display: none;
    }
    .arrow-icon.visible { display: inline; }

    .btn-add {
      padding: 12px 24px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-left: auto;
    }

    .btn-add:hover { background: #3a57e8; }
    .btn-add:active { transform: scale(0.97); }

    /* 필터 탭 */
    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .filter-tabs button {
      padding: 8px 16px;
      border: 1.5px solid #dde1e7;
      border-radius: 20px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .filter-tabs button.active {
      background: #4f6ef7;
      border-color: #4f6ef7;
      color: #fff;
      font-weight: 600;
    }

    /* 업무 하위 필터 탭 */
    .sub-filter-tabs {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      padding: 10px 14px;
      background: #f0f4ff;
      border-radius: 12px;
      border-left: 3px solid #4f6ef7;
    }

    .sub-filter-tabs.visible {
      display: flex;
    }

    .sub-filter-label {
      font-size: 0.78rem;
      color: #7a90f5;
      font-weight: 600;
      align-self: center;
      white-space: nowrap;
    }

    .sub-filter-tabs button {
      padding: 6px 14px;
      border: 1.5px solid #b3c4fc;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #3a57e8;
      transition: all 0.2s;
    }

    .sub-filter-tabs button.active {
      background: #3a57e8;
      border-color: #3a57e8;
      color: #fff;
      font-weight: 600;
    }

    .filter-gap { margin-bottom: 18px; }

    /* 통계 */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .stat-card .num {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4f6ef7;
    }

    .stat-card .label {
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
    }

    /* 할 일 목록 */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .todo-item {
      background: #fff;
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done { opacity: 0.55; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #aaa; }

    .todo-check {
      width: 22px;
      height: 22px;
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-body { flex: 1; }

    .todo-text {
      font-size: 0.97rem;
      color: #222;
      word-break: break-all;
    }

    .todo-meta {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-업무            { background: #e8f0fe; color: #3a57e8; }
    .badge-기존사업관리     { background: #dbeafe; color: #1d4ed8; }
    .badge-신규사업검토     { background: #ede9fe; color: #6d28d9; }
    .badge-개인            { background: #fce8ff; color: #9b27af; }
    .badge-쇼핑            { background: #fff3e0; color: #e65100; }
    .badge-건강            { background: #e8f5e9; color: #2e7d32; }
    .badge-학습            { background: #fef3c7; color: #92400e; }
    .badge-기타            { background: #f1f3f5; color: #555; }

    .badge-sub {
      background: none;
      border: 1px solid currentColor;
      opacity: 0.8;
    }

    .todo-date { font-size: 0.75rem; color: #bbb; }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #e53935; }

    /* 날짜 입력 행 */
    .date-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .date-row label {
      font-size: 0.82rem;
      color: #888;
      white-space: nowrap;
    }

    .date-row input[type="date"],
    .date-row input[type="time"] {
      padding: 8px 12px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-size: 0.88rem;
      outline: none;
      color: #333;
      background: #fff;
      cursor: pointer;
    }

    .date-row input:focus {
      border-color: #4f6ef7;
    }

    .date-clear {
      background: none;
      border: none;
      font-size: 0.8rem;
      color: #bbb;
      cursor: pointer;
      padding: 4px 6px;
    }
    .date-clear:hover { color: #e53935; }

    /* 캘린더 버튼 */
    .btn-cal {
      background: none;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
      color: #4285f4;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .btn-cal:hover {
      background: #e8f0fe;
      border-color: #4285f4;
    }

    /* 일정 날짜 표시 */
    .event-date {
      font-size: 0.75rem;
      color: #4285f4;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 할 일 관리</h1>

    <!-- 입력 -->
    <div class="input-box">
      <div class="input-row">
        <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." />
      </div>
      <div class="category-row">
        <select id="categorySelect" onchange="onCategoryChange()">
          <option value="업무">💼 업무</option>
          <option value="개인">🏠 개인</option>
          <option value="쇼핑">🛒 쇼핑</option>
          <option value="건강">💪 건강</option>
          <option value="학습">📚 학습</option>
          <option value="기타">📌 기타</option>
        </select>
        <span class="arrow-icon visible" id="arrowIcon">▶</span>
        <select id="subcategorySelect" class="visible">
          <option value="기존사업관리">📁 기존사업관리</option>
          <option value="신규사업검토">🔍 신규사업 검토</option>
        </select>
        <button class="btn-add" onclick="addTodo()">+ 추가</button>
      </div>
      <div class="date-row">
        <label>📅 일정:</label>
        <input type="date" id="eventDate" />
        <input type="time" id="eventTime" value="09:00" />
        <button class="date-clear" onclick="clearDate()" title="날짜 지우기">✕ 지우기</button>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="statTotal">0</div>
        <div class="label">전체</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statPending">0</div>
        <div class="label">진행 중</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statDone">0</div>
        <div class="label">완료</div>
      </div>
    </div>

    <!-- 메인 필터 탭 -->
    <div class="filter-tabs" id="filterTabs">
      <button class="active" onclick="setFilter('전체', this)">전체</button>
      <button onclick="setFilter('업무', this)">💼 업무</button>
      <button onclick="setFilter('개인', this)">🏠 개인</button>
      <button onclick="setFilter('쇼핑', this)">🛒 쇼핑</button>
      <button onclick="setFilter('건강', this)">💪 건강</button>
      <button onclick="setFilter('학습', this)">📚 학습</button>
      <button onclick="setFilter('기타', this)">📌 기타</button>
    </div>

    <!-- 업무 하위 필터 탭 -->
    <div class="sub-filter-tabs" id="subFilterTabs">
      <span class="sub-filter-label">└ 하위:</span>
      <button class="active" onclick="setSubFilter('전체', this)">전체</button>
      <button onclick="setSubFilter('기존사업관리', this)">📁 기존사업관리</button>
      <button onclick="setSubFilter('신규사업검토', this)">🔍 신규사업 검토</button>
    </div>
    <div id="filterGap" class="filter-gap" style="display:none"></div>

    <!-- 목록 -->
    <div class="todo-list" id="todoList"></div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let currentFilter    = '전체';
    let currentSubFilter = '전체';

    const SUB_LABEL = { '기존사업관리': '기존사업관리', '신규사업검토': '신규사업 검토' };

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    /* 카테고리 선택 시 하위 카테고리 표시/숨김 */
    function onCategoryChange() {
      const cat = document.getElementById('categorySelect').value;
      const sub  = document.getElementById('subcategorySelect');
      const arr  = document.getElementById('arrowIcon');
      if (cat === '업무') {
        sub.classList.add('visible');
        arr.classList.add('visible');
      } else {
        sub.classList.remove('visible');
        arr.classList.remove('visible');
      }
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text  = input.value.trim();
      if (!text) { input.focus(); return; }

      const category    = document.getElementById('categorySelect').value;
      const subEl       = document.getElementById('subcategorySelect');
      const subcategory = (category === '업무') ? subEl.value : null;
      const eventDate   = document.getElementById('eventDate').value;   // 'YYYY-MM-DD' or ''
      const eventTime   = document.getElementById('eventTime').value;   // 'HH:MM'

      todos.unshift({
        id: Date.now(),
        text,
        category,
        subcategory,
        done: false,
        createdAt: new Date().toLocaleDateString('ko-KR'),
        eventDate: eventDate || null,
        eventTime: eventTime || '09:00'
      });

      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggleDone(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) { todo.done = !todo.done; save(); render(); }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(filter, btn) {
      currentFilter    = filter;
      currentSubFilter = '전체';
      document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // 업무 선택 시 하위 필터 표시
      const subTabs = document.getElementById('subFilterTabs');
      const gap     = document.getElementById('filterGap');
      if (filter === '업무') {
        subTabs.classList.add('visible');
        gap.style.display = 'block';
        // 하위 필터 초기화
        document.querySelectorAll('#subFilterTabs button').forEach(b => b.classList.remove('active'));
        document.querySelector('#subFilterTabs button').classList.add('active');
      } else {
        subTabs.classList.remove('visible');
        gap.style.display = 'none';
      }
      render();
    }

    function setSubFilter(sub, btn) {
      currentSubFilter = sub;
      document.querySelectorAll('#subFilterTabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function getFiltered() {
      let list = todos;
      if (currentFilter !== '전체') {
        list = list.filter(t => t.category === currentFilter);
      }
      if (currentFilter === '업무' && currentSubFilter !== '전체') {
        list = list.filter(t => t.subcategory === currentSubFilter);
      }
      return list;
    }

    function render() {
      const list     = document.getElementById('todoList');
      const filtered = getFiltered();

      document.getElementById('statTotal').textContent   = todos.length;
      document.getElementById('statPending').textContent = todos.filter(t => !t.done).length;
      document.getElementById('statDone').textContent    = todos.filter(t => t.done).length;

      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty-msg">할 일이 없습니다 🎉</p>';
        return;
      }

      list.innerHTML = filtered.map(todo => {
        const catBadge = `<span class="badge badge-${todo.category}">${todo.category}</span>`;
        const subBadge = todo.subcategory
          ? `<span class="badge badge-${todo.subcategory} badge-sub">${SUB_LABEL[todo.subcategory] || todo.subcategory}</span>`
          : '';
        const dateBadge = todo.eventDate
          ? `<span class="event-date">📅 ${todo.eventDate} ${todo.eventTime}</span>`
          : '';
        return `
          <div class="todo-item ${todo.done ? 'done' : ''}">
            <input type="checkbox" class="todo-check" ${todo.done ? 'checked' : ''}
                   onchange="toggleDone(${todo.id})">
            <div class="todo-body">
              <div class="todo-text">${escapeHtml(todo.text)}</div>
              <div class="todo-meta">
                ${catBadge}${subBadge}
                ${dateBadge}
                <span class="todo-date">${todo.createdAt}</span>
              </div>
            </div>
            <button class="btn-cal" onclick="openCalendar(${todo.id})" title="구글 캘린더에 추가">📅</button>
            <button class="btn-delete" onclick="deleteTodo(${todo.id})" title="삭제">✕</button>
          </div>`;
      }).join('');
    }

    function clearDate() {
      document.getElementById('eventDate').value = '';
    }

    /* 구글 캘린더 URL 방식으로 이벤트 생성 페이지 열기 */
    function openCalendar(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;

      let dates;
      if (todo.eventDate) {
        // 날짜+시간이 지정된 경우 (1시간 이벤트)
        const start = todo.eventDate.replace(/-/g, '') + 'T' + todo.eventTime.replace(':', '') + '00';
        const endHour = String(Number(todo.eventTime.split(':')[0]) + 1).padStart(2, '0');
        const end   = todo.eventDate.replace(/-/g, '') + 'T' + endHour + todo.eventTime.split(':')[1] + '00';
        dates = start + '/' + end;
      } else {
        // 날짜 미지정 → 오늘 날짜 종일 이벤트
        const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
        dates = today + '/' + today;
      }

      const details = [
        '카테고리: ' + todo.category,
        todo.subcategory ? '세부: ' + (SUB_LABEL[todo.subcategory] || todo.subcategory) : ''
      ].filter(Boolean).join('\n');

      const url = 'https://calendar.google.com/calendar/r/eventedit'
        + '?text='    + encodeURIComponent(todo.text)
        + '&dates='   + dates
        + '&details=' + encodeURIComponent(details)
        + '&ctz=Asia/Seoul';

      window.open(url, '_blank');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
